const startOfWeek = (date) => { const d = new Date(date); d.setDate(d.getDate() - d.getDay()); return d; };
const addDays = (date, n) => { const d = new Date(date); d.setDate(d.getDate() + n); return d; };

// ─── Swim constants ───────────────────────────────────────────────────────────
const SWIM_EVENTS_DAUGHTER = [

  "50 Back","100 Back","200 Back",

// Daughter qualifying times (SCY)
const SEED_DAUGHTER_CUTS = {
  "50 Free":    { jrChamps:"33.69", champs:"28.19" },
  "100 Free":   { jrChamps:"1:11.39", champs:"1:01.19" },

const SEED_SON_CUTS = {
  "50 Free":   { allStar:"27.99" },
  "50 Back":   { allStar:"34.35" },

  "50 Fly":    { allStar:"30.64" },

// Time helpers
function timeToSec(t) {
  if (!t || t.trim() === "") return Infinity;
  const parts = t.trim().split(":");
  if (parts.length === 1) return parseFloat(parts[0]);
  return parseInt(parts[0]) * 60 + parseFloat(parts[1]);
}
function secToTime(s) {
  if (!isFinite(s)) return "";
  if (s < 60) return s.toFixed(2);
  const m = Math.floor(s / 60);
  const sec = (s % 60).toFixed(2).padStart(5, "0");
  return `${m}:${sec}`;
}
function qualStatus(personalBest, cuts, isSon) {
  const pb = timeToSec(personalBest);
  if (!isFinite(pb)) return "none";
  if (isSon) {
    return pb <= timeToSec(cuts?.allStar) ? "allStar" : "none";
  }
  if (pb <= timeToSec(cuts?.champs))   return "champs";
  if (pb <= timeToSec(cuts?.jrChamps)) return "jrChamps";
  return "none";
}

// ─── Main App ─────────────────────────────────────────────────────────────────
const PARENT_PIN = "1234"; // default PIN — shown in setup

function App() {
  const [tab, setTab]               = useState("calendar");
  const [members, setMembers]       = useState(SEED_MEMBERS);
  const [items, setItems]           = useState(SEED_ITEMS);
  const [rewards, setRewards]       = useState(SEED_REWARDS);
  const [meals, setMeals]           = useState({});
  const [calDate, setCalDate]       = useState(new Date());
  const [mealWeek, setMealWeek]     = useState(startOfWeek(new Date()));
  const [modal, setModal]           = useState(null);
  const [filterMember, setFilterMember] = useState(null);

  // ── Swim state ──
  // swimTimes: { swimmerKey: { eventName: "1:05.23" } }
  // swimmerKey: "daughter" | "son"
  const [swimTimes, setSwimTimes]       = useState({ daughter:{}, son:{} });
  const [daughterCuts, setDaughterCuts] = useState(SEED_DAUGHTER_CUTS);
  // Son All-Star cuts — pre-loaded from screenshot
  const [sonCuts, setSonCuts]           = useState(SEED_SON_CUTS);
  // Swimmer name mapping — parent sets in swim tab
  const [swimmerNames, setSwimmerNames] = useState({ daughter:"Daughter", son:"Son" });

  // ── Approval queues ──
  // pendingCompletions: [{ id, itemId, memberId, itemTitle, stars, date, type }]
  // pendingRedemptions: [{ id, rewardId, memberId, rewardTitle, cost, date }]
  const [pendingCompletions, setPendingCompletions] = useState([]);
  const [pendingRedemptions, setPendingRedemptions] = useState([]);

  // ── Parent mode ──
  const [parentMode, setParentMode] = useState(false);
  const [pin, setPin]               = useState(PARENT_PIN); // parent can change this
  const [showParentPanel, setShowParentPanel] = useState(false);

  const memberById = (id) => members.find((m) => m.id === id);

  const addStars = (memberId, amount) =>
    setMembers((prev) => prev.map((m) => m.id === memberId ? { ...m, stars: Math.max(0, m.stars + amount) } : m));

  // Kid marks a chore/task done → goes to pending, no stars yet
  const toggleComplete = (itemId) => {
    const todayStr = new Date().toDateString();
    setItems((prev) => prev.map((it) => {
      if (it.id !== itemId) return it;
      const alreadyPending = pendingCompletions.some(p => p.itemId === itemId && p.date === todayStr);
      const alreadyApproved = it.completedDates.includes(todayStr);

      if (alreadyApproved) {
        // Parent mode: allow undo of approved completion
        if (parentMode) {
          if (it.stars > 0) addStars(it.memberId, -it.stars);
          return { ...it, completedDates: it.completedDates.filter(d => d !== todayStr) };
        }
        return it; // kids can't undo approved items
      }
      if (alreadyPending) {
        // Cancel pending submission
        setPendingCompletions(prev => prev.filter(p => !(p.itemId === itemId && p.date === todayStr)));
        return it;
      }
      // Add to pending queue
      if (it.stars > 0) {
        setPendingCompletions(prev => [...prev, {
          id: Date.now(), itemId, memberId: it.memberId,
          itemTitle: it.title, stars: it.stars, date: todayStr, type: it.type,
        }]);
      }
      // For 0-star items (reminders etc), just mark done directly
      if (it.stars === 0) {
        return { ...it, completedDates: [...it.completedDates, todayStr] };
      }
      return it;
    }));
  };

  // Parent approves a completion → award stars, mark done
  const approveCompletion = (pendingId) => {
    const p = pendingCompletions.find(pc => pc.id === pendingId);
    if (!p) return;
    addStars(p.memberId, p.stars);
    setItems(prev => prev.map(it =>
      it.id === p.itemId ? { ...it, completedDates: [...it.completedDates, p.date] } : it
    ));
    setPendingCompletions(prev => prev.filter(pc => pc.id !== pendingId));
  };

  // Parent rejects a completion → remove from queue, item stays unchecked
  const rejectCompletion = (pendingId) => {
    setPendingCompletions(prev => prev.filter(pc => pc.id !== pendingId));
  };

  // Kid requests reward redemption → goes to pending
  const requestRedemption = (reward, memberId) => {
    const member = memberById(memberId);
    if (!member || member.stars < reward.cost) return alert("Not enough stars! Keep completing chores and tasks.");
    const alreadyPending = pendingRedemptions.some(p => p.rewardId === reward.id && p.memberId === memberId);
    if (alreadyPending) return alert("You already have a pending request for this reward!");
    setPendingRedemptions(prev => [...prev, {
      id: Date.now(), rewardId: reward.id, memberId,
      rewardTitle: reward.title, cost: reward.cost, date: new Date().toDateString(),
    }]);
    alert(`✅ Request sent! Wait for a parent to approve "${reward.title}".`);
  };

  // Parent approves redemption → deduct stars
  const approveRedemption = (pendingId) => {
    const p = pendingRedemptions.find(pr => pr.id === pendingId);
    if (!p) return;
    addStars(p.memberId, -p.cost);
    setPendingRedemptions(prev => prev.filter(pr => pr.id !== pendingId));
    alert(`🎉 ${memberById(p.memberId)?.name} redeemed: "${p.rewardTitle}"!`);
  };

  // Parent rejects redemption
  const rejectRedemption = (pendingId) => {
    setPendingRedemptions(prev => prev.filter(pr => pr.id !== pendingId));
  };

  const totalPending = pendingCompletions.length + pendingRedemptions.length;
  const visibleItems = filterMember ? items.filter((i) => i.memberId === filterMember) : items;
  const activeMember = filterMember ? memberById(filterMember) : null;

  // Is an item pending approval today?
  const isPending = (itemId) => {
    const todayStr = new Date().toDateString();
    return pendingCompletions.some(p => p.itemId === itemId && p.date === todayStr);
  };

  return (
    <div style={S.app}>
      {/* ── Header ── */}
      <header style={S.header}>
        <div style={S.headerLeft}>
          <span style={S.logo}>🏠</span>
          <span style={S.appName}>Family Hub</span>
        </div>
        <div style={S.headerRight}>
          <button
            onClick={() => setFilterMember(null)}
            style={{ ...S.memberPill, background: filterMember===null?"#1F2937":"#E5E7EB", color: filterMember===null?"#fff":"#6B7280", fontSize:11, width:"auto", padding:"0 10px", borderRadius:20 }}
          >All</button>
          {members.map((m) => (
            <button key={m.id}
              onClick={() => setFilterMember(filterMember===m.id ? null : m.id)}
              style={{ ...S.memberPill, background:m.color, opacity: filterMember&&filterMember!==m.id?0.35:1, outline: filterMember===m.id?`3px solid ${m.color}`:"none", outlineOffset:2 }}
              title={m.name}
            >{m.name[0]}</button>
          ))}
          <button style={S.addMemberBtn} onClick={() => setModal({ type:"addMember" })} title="Add family member">+</button>

          {/* Parent mode button */}
          <button
            onClick={() => setShowParentPanel(true)}
            style={{ ...S.parentBtn, background: parentMode?"#7C3AED":"#F3F4F6", color: parentMode?"#fff":"#6B7280" }}
            title="Parent controls"
          >
            🔑{totalPending > 0 && <span style={S.pendingBadge}>{totalPending}</span>}
          </button>
        </div>
      </header>

      {/* ── Parent mode banner ── */}
      {parentMode && (
        <div style={S.parentBanner}>
          <span style={S.parentBannerText}>🔑 Parent Mode — you can approve, reject, and manage all items</span>
          <button style={S.parentBannerClose} onClick={() => setParentMode(false)}>Lock</button>
        </div>
      )}

      {/* ── Active member banner ── */}
      {activeMember && !parentMode && (
        <div style={{ ...S.memberBanner, background: activeMember.color }}>
          <span style={S.bannerName}>{activeMember.name}'s View</span>
          <div style={S.bannerStarBadge}>
            <span style={S.bannerStarIcon}>⭐</span>
            <span style={S.bannerStarCount}>{activeMember.stars} stars</span>
          </div>
          <button style={S.bannerClose} onClick={() => setFilterMember(null)}>✕ All</button>
        </div>
      )}

      {/* ── Tab bar ── */}
      <nav style={S.nav}>
        {[
          { id:"calendar", icon:"📅", label:"Calendar" },
          { id:"chores",   icon:"🧹", label:"Chores" },
          { id:"meals",    icon:"🍽️", label:"Meals" },
          { id:"rewards",  icon:"⭐", label:"Rewards" },
          { id:"swim",     icon:"🏊", label:"Swim" },
        ].map((t) => (
          <button key={t.id} onClick={() => setTab(t.id)}
            style={{ ...S.tab, ...(tab===t.id ? { ...S.tabActive, borderBottomColor: activeMember?.color||"#3B82F6", color: activeMember?.color||"#3B82F6" } : {}) }}>
            <span style={S.tabIcon}>{t.icon}</span>
            <span style={S.tabLabel}>{t.label}</span>
          </button>
        ))}
      </nav>

      {/* ── Content ── */}
      <main style={S.main}>
        {tab === "calendar" && (
          <CalendarTab items={visibleItems} members={members} memberById={memberById}
            calDate={calDate} setCalDate={setCalDate} activeMember={activeMember} setModal={setModal}
            meals={meals} toggleComplete={toggleComplete} isPending={isPending} parentMode={parentMode} />
        )}
        {tab === "chores" && (
          <ChoresTab items={visibleItems} members={members} memberById={memberById}
            toggleComplete={toggleComplete} activeMember={activeMember} setModal={setModal}
            parentMode={parentMode} isPending={isPending} />
        )}
        {tab === "meals" && (
          <MealsTab meals={meals} setMeals={setMeals} mealWeek={mealWeek} setMealWeek={setMealWeek} />
        )}
        {tab === "rewards" && (
          <RewardsTab rewards={rewards} members={members} memberById={memberById}
            requestRedemption={requestRedemption} activeMember={activeMember} setModal={setModal}
            parentMode={parentMode} pendingRedemptions={pendingRedemptions}
            setRewards={setRewards} />
        )}
        {tab === "swim" && (
          <SwimTab
            swimTimes={swimTimes} setSwimTimes={setSwimTimes}
            daughterCuts={daughterCuts} setDaughterCuts={setDaughterCuts}
            sonCuts={sonCuts} setSonCuts={setSonCuts}
            swimmerNames={swimmerNames} setSwimmerNames={setSwimmerNames}
            parentMode={parentMode} />
        )}
      </main>

      {/* ── Parent panel ── */}
      {showParentPanel && (
        <ParentPanel
          pin={pin} setPin={setPin}
          parentMode={parentMode} setParentMode={setParentMode}
          pendingCompletions={pendingCompletions}
          pendingRedemptions={pendingRedemptions}
          approveCompletion={approveCompletion} rejectCompletion={rejectCompletion}
          approveRedemption={approveRedemption} rejectRedemption={rejectRedemption}
          memberById={memberById} members={members}
          onClose={() => setShowParentPanel(false)}
        />
      )}

      {modal && (
        <Modal modal={modal} setModal={setModal}
          members={members} setMembers={setMembers}
          setItems={setItems} setRewards={setRewards}
          MEMBER_COLORS={MEMBER_COLORS} />
      )}
    </div>
  );
}

// ─── Calendar Tab ─────────────────────────────────────────────────────────────
function CalendarTab({ items, members, memberById, calDate, setCalDate, activeMember, setModal, meals, toggleComplete, isPending, parentMode }) {
  const [view, setView]           = useState("month");
  const [weekStart, setWeekStart] = useState(startOfWeek(new Date()));

  const year  = calDate.getFullYear();
  const month = calDate.getMonth();

  const firstDay    = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < firstDay; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));

  const itemsOn = (date) => {
    if (!date) return [];
    return items.filter((it) => {
      if (it.frequency === "Daily") return true;
      if (it.frequency === "Weekly") return date.getDay() === new Date(it.date).getDay();
      return isSameDay(new Date(it.date), date);
    });
  };

  const mealsOn = (date) => {
    const dk = dateKey(date);
    return MEAL_SLOTS.map(slot => {
      const cell = meals[`${dk}_${slot}`];
      return cell?.text ? { slot, text: cell.text } : null;
    }).filter(Boolean);
  };

  const todayStr = new Date().toDateString();

  // Week: Mon–Sun order
  const monStart  = (() => { const d = new Date(weekStart); d.setDate(d.getDate() + 1); return d; })();
  // If weekStart is Sunday, shift to Monday
  const weekDays  = Array.from({ length: 7 }, (_, i) => addDays(weekStart, i === 0 ? 1 : i === 6 ? 0 : i + 1));
  // Actually just sort Sun–Sat but display Mon first
  const orderedWeekDays = (() => {
    const sun = new Date(weekStart);
    const days = Array.from({ length: 7 }, (_, i) => addDays(sun, i));
    // Reorder: Mon Tue Wed Thu Fri Sat Sun
    return [...days.slice(1), days[0]];
  })();

  const weekLabel = `${orderedWeekDays[0].toLocaleDateString("en-US",{month:"short",day:"numeric"})} – ${orderedWeekDays[6].toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`;

  const switchToWeek  = () => { setWeekStart(startOfWeek(calDate)); setView("week"); };
  const switchToMonth = () => { setCalDate(new Date(weekStart.getFullYear(), weekStart.getMonth(), 1)); setView("month"); };

  const monthStars = activeMember
    ? items.filter(it => it.memberId === activeMember.id && it.stars > 0)
        .reduce((acc, it) => {
          const earned = it.completedDates.filter(ds => {
            const d = new Date(ds);
            return d.getFullYear() === year && d.getMonth() === month;
          }).length;
          return acc + earned * it.stars;
        }, 0)
    : null;

  // Pastel backgrounds per type
  const cardBg   = { event:"#DBEAFE", chore:"#DCFCE7", task:"#DCFCE7", reminder:"#FEF3C7" };
  const cardText = { event:"#1D4ED8", chore:"#166534", task:"#166534", reminder:"#92400E" };

  const WEEK_DAYS_SHORT = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  return (
    <div>
      {/* Controls */}
      <div style={S.calHeader}>
        <button style={S.navBtn} onClick={view==="month" ? ()=>setCalDate(new Date(year,month-1,1)) : ()=>setWeekStart(w=>addDays(w,-7))}>‹</button>
        <h2 style={S.calTitle}>{view==="month" ? `${MONTHS[month]} ${year}` : weekLabel}</h2>
        <button style={S.navBtn} onClick={view==="month" ? ()=>setCalDate(new Date(year,month+1,1)) : ()=>setWeekStart(w=>addDays(w,7))}>›</button>
        <div style={S.viewToggle}>
          <button style={{ ...S.viewBtn, ...(view==="month"?S.viewBtnActive:{}) }} onClick={switchToMonth}>Month</button>
          <button style={{ ...S.viewBtn, ...(view==="week" ?S.viewBtnActive:{}) }} onClick={switchToWeek}>Week</button>
        </div>
        <button style={{ ...S.addBtn, background: activeMember?.color||"#3B82F6" }} onClick={() => setModal({ type:"addItem" })}>+ Add</button>
      </div>

      {/* Member star banner */}
      {activeMember && (
        <div style={{ ...S.starBanner, background: activeMember.color+"18", border:`1.5px solid ${activeMember.color}40` }}>
          <div style={{ ...S.starBannerAvatar, background: activeMember.color }}>{activeMember.name[0]}</div>
          <div>
            <div style={{ fontWeight:700, fontSize:14, color: activeMember.color }}>{activeMember.name}</div>
            <div style={{ fontSize:12, color:"#6B7280" }}>Total: <strong>{activeMember.stars} ⭐</strong> · This month: <strong>{monthStars} ⭐</strong></div>
          </div>
        </div>
      )}

      {/* ── MONTH VIEW ── */}
      {view === "month" && (
        <>
          <div style={S.calGrid7}>
            {DAYS.map(d => <div key={d} style={S.calDayLabel}>{d}</div>)}
          </div>
          <div style={S.calGrid7}>

// ─── Ingredient scaler helper ─────────────────────────────────────────────────
// Attempts to scale leading numbers in an ingredient string by a multiplier.
// e.g. "500g ground beef" × 2 → "1000g ground beef"
// e.g. "2 eggs" × 3 → "6 eggs"
// e.g. "½ cup milk" × 2 → "1 cup milk"
const FRACTIONS = { "½": 0.5, "¼": 0.25, "¾": 0.75, "⅓": 0.333, "⅔": 0.667, "⅛": 0.125 };
function scaleIngredient(ing, mult) {
  if (mult === 1) return ing;
  // Try fraction at start
  for (const [sym, val] of Object.entries(FRACTIONS)) {
    if (ing.startsWith(sym)) {
      const scaled = val * mult;
      const nice = scaled % 1 === 0 ? scaled : parseFloat(scaled.toFixed(2));
      return ing.replace(sym, String(nice));
    }
  }
  // Try leading number (integer or decimal)
  const m = ing.match(/^(\d+\.?\d*)(.*)/);
  if (m) {
    const scaled = parseFloat(m[1]) * mult;
    const nice = scaled % 1 === 0 ? scaled : parseFloat(scaled.toFixed(2));
    return `${nice}${m[2]}`;
  }
  return ing; // can't scale — return as-is
}

  const getMeal  = (date, slot) => meals[keyFor(date, slot)] || { text: "", recipeId: null };
  const setMeal  = (date, slot, val) => setMeals((prev) => ({ ...prev, [keyFor(date, slot)]: val }));

  // Pick a recipe for a cell
  const pickRecipe = (recipe) => {
    if (!pickerCell) return;
    setMeal(new Date(pickerCell.dateKey), pickerCell.slot, { text: recipe.name, recipeId: recipe.id });
    setPickerCell(null);
  };

  // Grocery list: gather all ingredients from planned meals that have a linked recipe

    const recipeIds = new Set();
    Object.values(meals).forEach((m) => { if (m?.recipeId) recipeIds.add(m.recipeId); });
    const ingredientMap = {};

      const r = recipes.find((rc) => rc.id === rid);
      if (!r) return;
      r.ingredients.forEach((ing) => {
        ingredientMap[ing] = (ingredientMap[ing] || []);
        if (!ingredientMap[ing].includes(r.name)) ingredientMap[ing].push(r.name);

      {/* ── PLANNER VIEW ── */}
      {mealView === "planner" && (
        <div style={S.mealGrid}>
          <div style={S.mealSlotHeader} />
          {weekDays.map((d) => (
            <div key={d.toISOString()} style={{ ...S.mealDayHeader, ...(isSameDay(d,new Date())?{background:"#EFF6FF",color:"#3B82F6"}:{}) }}>
              <div style={{ fontWeight:700 }}>{DAYS[d.getDay()]}</div>
              <div style={{ fontSize:11, opacity:0.7 }}>{d.getDate()}</div>
            </div>
          ))}
          {MEAL_SLOTS.map((slot) => (
            <>
              <div key={slot+"_l"} style={S.mealSlotLabel}>{slot}</div>
              {weekDays.map((d) => {
                const cell = getMeal(d, slot);
                return (
                  <div key={keyFor(d,slot)} style={S.mealCell}>
                    {cell.text ? (
                      <div style={S.mealCellFilled}>
                        {cell.recipeId && <span style={S.mealCellRecipeIcon}>📖</span>}
                        <span style={S.mealCellText}>{cell.text}</span>
                        <button style={S.mealCellClear} onClick={() => setMeal(d, slot, { text:"", recipeId:null })}>✕</button>
                      </div>
                    ) : (
                      <div style={S.mealCellEmpty}>
                        <button style={S.mealPickBtn} onClick={() => setPickerCell({ dateKey: dateKey(d), slot })} title="Choose from recipes">📖</button>
                        <input
                          value=""
                          onChange={(e) => setMeal(d, slot, { text: e.target.value, recipeId: null })}
                          placeholder="Type…"
                          style={S.mealInput}
                        />
                      </div>
                    )}
                  </div>
                );
              })}
            </>
          ))}
        </div>
      )}

      {/* ── RECIPES VIEW ── */}
      {mealView === "recipes" && (
        <div>
          {addingRecipe && (
            <div style={S.addRecipeBox}>
              <div style={{ fontWeight:700, fontSize:15, marginBottom:10 }}>New Recipe</div>
              <Label>Recipe name</Label>
              <Input placeholder="e.g. Tacos" value={newRecipe.name} onChange={e => setNewRecipe(p=>({...p,name:e.target.value}))} />
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:8 }}>
                <div>
                  <Label>Category</Label>
                  <Select value={newRecipe.category} onChange={e => setNewRecipe(p=>({...p,category:e.target.value}))}>
                    {["Breakfast","Lunch","Dinner","Snack"].map(c=><option key={c}>{c}</option>)}
                  </Select>
                </div>
                <div>
                  <Label>Servings</Label>
                  <Input type="number" min={1} placeholder="2" value={newRecipe.servings} onChange={e => setNewRecipe(p=>({...p,servings:e.target.value}))} />
                </div>
                <div>
                  <Label>Prep time</Label>
                  <Input placeholder="15 min" value={newRecipe.prepTime} onChange={e => setNewRecipe(p=>({...p,prepTime:e.target.value}))} />
                </div>
                <div>
                  <Label>Cook time</Label>
                  <Input placeholder="30 min" value={newRecipe.cookTime} onChange={e => setNewRecipe(p=>({...p,cookTime:e.target.value}))} />
                </div>
              </div>
              <Label>Ingredients (one per line)</Label>
              <textarea value={newRecipe.ingredients} onChange={e => setNewRecipe(p=>({...p,ingredients:e.target.value}))}
                placeholder={"500g pasta\n1 onion\n..."} rows={4}
                style={{ width:"100%", padding:"8px 10px", borderRadius:8, border:"1.5px solid #E5E7EB", fontSize:13, boxSizing:"border-box", resize:"vertical", fontFamily:"inherit" }} />
              <Label>Steps (one per line)</Label>
              <textarea value={newRecipe.steps} onChange={e => setNewRecipe(p=>({...p,steps:e.target.value}))}
                placeholder={"Boil water\nAdd pasta\n..."} rows={4}
                style={{ width:"100%", padding:"8px 10px", borderRadius:8, border:"1.5px solid #E5E7EB", fontSize:13, boxSizing:"border-box", resize:"vertical", fontFamily:"inherit" }} />
              <div style={{ display:"flex", gap:8, marginTop:12 }}>
                <button style={S.cancelBtn} onClick={() => setAddingRecipe(false)}>Cancel</button>
                <button style={S.submitBtn} onClick={saveNewRecipe}>Save Recipe</button>
              </div>
            </div>
          )}
          <div style={{ display:"flex", flexDirection:"column", gap:10, marginTop: addingRecipe ? 16 : 0 }}>
            {recipes.map(r => (
              <div key={r.id} style={S.recipeCard}>
                <div style={{ flex:1 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                    <span style={{ fontWeight:700, fontSize:14 }}>{r.name}</span>
                    <span style={{ ...S.recipeCatBadge, background: categoryColors[r.category]||"#6B7280" }}>{r.category}</span>
                  </div>
                  <div style={{ fontSize:11, color:"#9CA3AF" }}>
                    👤 {r.servings} servings
                    {r.prepTime !== "—" && ` · ⏱ Prep ${r.prepTime}`}
                    {r.cookTime !== "—" && ` · 🍳 Cook ${r.cookTime}`}
                  </div>
                  <div style={{ fontSize:11, color:"#6B7280", marginTop:3 }}>
                    {r.ingredients.slice(0,3).join(", ")}{r.ingredients.length > 3 ? ` +${r.ingredients.length-3} more` : ""}
                  </div>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                  <button style={{ ...S.addBtn, fontSize:11, padding:"5px 10px" }} onClick={() => { setDetailMult(1); setViewRecipe(r); }}>View</button>
                  <button style={{ ...S.addBtn, fontSize:11, padding:"5px 10px", background:"#10B981" }}
                    onClick={() => { setMealView("planner"); setPickerCell({ dateKey: dateKey(new Date()), slot:"Dinner" }); setTimeout(()=>pickRecipe(r),0); }}>
                    Plan it
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── GROCERY LIST VIEW ── */}
      {mealView === "grocery" && (
        <div>
          {grocery.length === 0 ? (
            <div style={{ color:"#9CA3AF", fontSize:13, padding:"20px 0", textAlign:"center" }}>
              No meals planned from recipes yet.<br/>Go to the Planner and use 📖 to pick recipes — their ingredients will appear here.
            </div>
          ) : (
            <>
              {/* Serving multiplier */}
              <div style={S.scalerBox}>
                <span style={S.scalerLabel}>👤 Servings per recipe</span>
                <div style={S.scalerControls}>
                  <button style={S.scalerBtn} onClick={() => setMultiplier(m => Math.max(1, m - 1))} disabled={multiplier === 1}>−</button>
                  <span style={S.scalerValue}>{2 * multiplier} people <span style={{ fontSize:11, color:"#9CA3AF", fontWeight:400 }}>(base 2 × {multiplier})</span></span>
                  <button style={S.scalerBtn} onClick={() => setMultiplier(m => m + 1)}>+</button>
                </div>
                <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                  {[1,2,3,4].map(n => (
                    <button key={n} onClick={() => setMultiplier(n)} style={{
                      padding:"3px 10px", borderRadius:12, border:"1.5px solid #E5E7EB", fontSize:11, fontWeight:700, cursor:"pointer",
                      background: multiplier===n ? "#3B82F6" : "#fff", color: multiplier===n ? "#fff" : "#6B7280",
                    }}>{n}× · {2*n} people</button>
                  ))}
                </div>
              </div>

              <div style={{ fontSize:12, color:"#6B7280", margin:"12px 0 8px" }}>
                {new Set(Object.values(meals).filter(m=>m?.recipeId).map(m=>m.recipeId)).size} recipe(s) planned · quantities scaled for <strong>{2 * multiplier} people</strong>. Tap to check off as you shop.
              </div>
              <div style={{ display:"flex", flexDirection:"column", gap:4 }}>
                {grocery.map(([ing, fromRecipes]) => (
                  <div key={ing} onClick={() => toggleIngredient(ing)}
                    style={{ ...S.groceryRow, opacity: checkedIngredients[ing] ? 0.4 : 1 }}>
                    <div style={{ ...S.groceryCheck, background: checkedIngredients[ing] ? "#10B981" : "#F3F4F6", color: checkedIngredients[ing] ? "#fff" : "#9CA3AF" }}>
                      {checkedIngredients[ing] ? "✓" : "○"}
                    </div>
                    <div style={{ flex:1 }}>
                      <div style={{ fontSize:13, fontWeight:600, textDecoration: checkedIngredients[ing]?"line-through":"none" }}>
                        {multiplier === 1 ? ing : <><strong style={{ color:"#3B82F6" }}>{scaleIngredient(ing, multiplier)}</strong></>}
                      </div>
                      <div style={{ fontSize:10, color:"#9CA3AF" }}>for {fromRecipes.join(", ")}</div>
                    </div>
                  </div>
                ))}
              </div>
              <button style={{ ...S.addBtn, marginTop:16, background:"#EF4444" }}
                onClick={() => setCheckedIngredients({})}>Clear checks</button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Rewards Tab ──────────────────────────────────────────────────────────────
// ─── Parent Panel ─────────────────────────────────────────────────────────────
function ParentPanel({ pin, setPin, parentMode, setParentMode, pendingCompletions, pendingRedemptions,
  approveCompletion, rejectCompletion, approveRedemption, rejectRedemption, memberById, members, onClose }) {
  const [entered, setEntered]   = useState("");
  const [unlocked, setUnlocked] = useState(parentMode);
  const [pinError, setPinError] = useState(false);
  const [activeTab, setActiveTab] = useState("completions");
  const [changingPin, setChangingPin] = useState(false);
  const [newPin, setNewPin] = useState("");

  const tryUnlock = () => {
    if (entered === pin) {
      setUnlocked(true);
      setParentMode(true);
      setPinError(false);
    } else {
      setPinError(true);
      setEntered("");
    }
  };

  const lock = () => {
    setParentMode(false);
    setUnlocked(false);
    setEntered("");
    onClose();
  };

  const savePin = () => {
    if (newPin.length < 4) return alert("PIN must be at least 4 digits.");
    setPin(newPin);
    setNewPin("");
    setChangingPin(false);
    alert("PIN updated!");
  };

  return (
    <div style={S.overlay} onClick={onClose}>
      <div style={{ ...S.modalBox, maxWidth:480 }} onClick={e => e.stopPropagation()}>
        <div style={S.modalHeader}>
          <h3 style={S.modalTitle}>🔑 Parent Controls</h3>
          <button style={S.modalClose} onClick={onClose}>✕</button>
        </div>

        {!unlocked ? (
          /* PIN entry */
          <div style={{ padding:"24px 20px", textAlign:"center" }}>
            <div style={{ fontSize:14, color:"#6B7280", marginBottom:16 }}>Enter your parent PIN to continue</div>
            <div style={{ display:"flex", justifyContent:"center", gap:10, marginBottom:16 }}>
              {[1,2,3,4].map(i => (
                <div key={i} style={{ width:14, height:14, borderRadius:"50%", background: entered.length>=i?"#7C3AED":"#E5E7EB" }} />
              ))}
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 1fr)", gap:8, maxWidth:220, margin:"0 auto 16px" }}>
              {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((k, i) => (
                <button key={i} onClick={() => {
                  if (k === "⌫") setEntered(p => p.slice(0,-1));
                  else if (k !== "" && entered.length < 4) setEntered(p => p + k);
                }} style={{
                  padding:"14px", borderRadius:10, border:"1.5px solid #E5E7EB",
                  background: k===""?"transparent":"#fff", fontSize:18, fontWeight:700,
                  cursor: k===""?"default":"pointer", color:"#1F2937",
                  visibility: k===""?"hidden":"visible",
                }}>
                  {k}
                </button>
              ))}
            </div>
            {pinError && <div style={{ color:"#EF4444", fontSize:13, marginBottom:10 }}>Incorrect PIN. Try again.</div>}
            <button style={{ ...S.submitBtn, width:"100%", padding:"10px" }} onClick={tryUnlock} disabled={entered.length < 4}>
              Unlock
            </button>
            <div style={{ fontSize:11, color:"#9CA3AF", marginTop:12 }}>Default PIN: 1234</div>
          </div>
        ) : (
          /* Approval dashboard */
          <div style={{ padding:"0 0 16px" }}>
            {/* Sub-tabs */}
            <div style={{ display:"flex", borderBottom:"1px solid #F0F0F0", marginBottom:16 }}>
              {[
                ["completions", `✅ Chores (${pendingCompletions.length})`],
                ["redemptions", `🎁 Rewards (${pendingRedemptions.length})`],
                ["settings",   "⚙️ Settings"],
              ].map(([t, label]) => (
                <button key={t} onClick={() => setActiveTab(t)} style={{
                  flex:1, padding:"10px 4px", border:"none", background:"transparent", cursor:"pointer",
                  fontSize:11, fontWeight:700, color: activeTab===t?"#7C3AED":"#9CA3AF",
                  borderBottom: activeTab===t?"2px solid #7C3AED":"2px solid transparent",
                }}>{label}</button>
              ))}
            </div>

            <div style={{ padding:"0 18px" }}>
              {/* ── Pending completions ── */}
              {activeTab === "completions" && (
                <div>
                  {pendingCompletions.length === 0
                    ? <div style={S.emptyMsg}>No pending approvals right now 🎉</div>
                    : pendingCompletions.map(p => {
                        const m = memberById(p.memberId);
                        return (
                          <div key={p.id} style={S.approvalRow}>
                            <div style={{ ...S.approvalAvatar, background: m?.color||"#ccc" }}>{m?.name[0]}</div>
                            <div style={{ flex:1 }}>
                              <div style={{ fontWeight:700, fontSize:13 }}>{ITEM_TYPES[p.type]||"✅"} {p.itemTitle}</div>
                              <div style={{ fontSize:11, color:"#9CA3AF" }}>{m?.name} · {p.date} · ⭐ {p.stars} pts</div>
                            </div>
                            <div style={{ display:"flex", gap:6 }}>
                              <button onClick={() => approveCompletion(p.id)} style={S.approveBtn}>✓</button>
                              <button onClick={() => rejectCompletion(p.id)} style={S.rejectBtn}>✕</button>
                            </div>
                          </div>
                        );
                      })
                  }
                </div>
              )}

              {/* ── Pending redemptions ── */}
              {activeTab === "redemptions" && (
                <div>
                  {pendingRedemptions.length === 0
                    ? <div style={S.emptyMsg}>No reward requests yet 🎁</div>
                    : pendingRedemptions.map(p => {
                        const m = memberById(p.memberId);
                        return (
                          <div key={p.id} style={S.approvalRow}>
                            <div style={{ ...S.approvalAvatar, background: m?.color||"#ccc" }}>{m?.name[0]}</div>
                            <div style={{ flex:1 }}>
                              <div style={{ fontWeight:700, fontSize:13 }}>🎁 {p.rewardTitle}</div>
                              <div style={{ fontSize:11, color:"#9CA3AF" }}>{m?.name} · ⭐ {p.cost} stars · {p.date}</div>
                            </div>
                            <div style={{ display:"flex", gap:6 }}>
                              <button onClick={() => approveRedemption(p.id)} style={S.approveBtn}>✓</button>
                              <button onClick={() => rejectRedemption(p.id)} style={S.rejectBtn}>✕</button>
                            </div>
                          </div>
                        );
                      })
                  }
                </div>
              )}

              {/* ── Settings ── */}
              {activeTab === "settings" && (
                <div>
                  <div style={{ fontWeight:700, fontSize:13, marginBottom:12 }}>Star Balances</div>
                  {members.map(m => (
                    <div key={m.id} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:"1px solid #F9FAFB" }}>
                      <div style={{ ...S.approvalAvatar, background:m.color }}>{m.name[0]}</div>
                      <span style={{ flex:1, fontWeight:600, fontSize:13 }}>{m.name}</span>
                      <span style={{ fontWeight:800, fontSize:15 }}>{m.stars} ⭐</span>
                    </div>
                  ))}
                  <div style={{ marginTop:20 }}>
                    <div style={{ fontWeight:700, fontSize:13, marginBottom:8 }}>Change PIN</div>
                    {changingPin ? (
                      <div style={{ display:"flex", gap:8 }}>
                        <input value={newPin} onChange={e=>setNewPin(e.target.value.replace(/\D/g,"").slice(0,6))}
                          placeholder="New PIN (4+ digits)" type="password"
                          style={{ flex:1, padding:"8px 10px", borderRadius:8, border:"1.5px solid #E5E7EB", fontSize:14 }} />
                        <button style={S.approveBtn} onClick={savePin}>Save</button>
                        <button style={S.rejectBtn} onClick={() => setChangingPin(false)}>✕</button>
                      </div>
                    ) : (
                      <button style={{ ...S.addBtn, background:"#6B7280" }} onClick={() => setChangingPin(true)}>Change PIN</button>
                    )}
                  </div>
                </div>
              )}
            </div>

            <div style={{ padding:"12px 18px 0", borderTop:"1px solid #F0F0F0", marginTop:12 }}>
              <button style={{ ...S.cancelBtn, width:"100%" }} onClick={lock}>🔒 Lock Parent Mode</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Rewards Tab ──────────────────────────────────────────────────────────────
function RewardsTab({ rewards, members, memberById, requestRedemption, activeMember, setModal, parentMode, pendingRedemptions, setRewards }) {
  const [selectedMember, setSelectedMember] = useState(activeMember?.id || null);
  const [editingId, setEditingId]           = useState(null);
  const [editForm, setEditForm]             = useState({});

  const startEdit = (r) => { setEditingId(r.id); setEditForm({ title: r.title, cost: String(r.cost) }); };
  const saveEdit  = () => {
    if (!editForm.title || !editForm.cost) return;
    setRewards(prev => prev.map(r => r.id === editingId ? { ...r, title: editForm.title, cost: +editForm.cost } : r));
    setEditingId(null);
  };
  const deleteReward = (id) => {
    if (!window.confirm("Delete this reward?")) return;
    setRewards(prev => prev.filter(r => r.id !== id));
  };

  return (
    <div>
      <div style={S.calHeader}>
        <h2 style={S.sectionTitle2}>Rewards Store</h2>
        {parentMode && <button style={{ ...S.addBtn, background:"#7C3AED" }} onClick={() => setModal({ type:"addReward" })}>+ Add Reward</button>}
      </div>

      {/* Star balances */}
      <div style={S.starCards}>
        {members.map((m) => (
          <div key={m.id} onClick={() => setSelectedMember(selectedMember===m.id ? null : m.id)}
            style={{ ...S.starCard, border:`3px solid ${selectedMember===m.id?m.color:"transparent"}`, background: selectedMember===m.id?m.color+"15":"#fff" }}>
            <div style={{ ...S.starCardAvatar, background:m.color }}>{m.name[0]}</div>
            <div style={S.starCardName}>{m.name}</div>
            <div style={S.starCardCount}>{m.stars} ⭐</div>
          </div>
        ))}
      </div>

      {selectedMember && pendingRedemptions.filter(p => p.memberId === selectedMember).length > 0 && (
        <div style={{ ...S.approvalInfoBox, background:"#FEF3C7", border:"1px solid #FCD34D", color:"#92400E", marginBottom:12 }}>
          ⏳ You have a pending reward request — waiting for parent approval!
        </div>
      )}
      {selectedMember && (
        <div style={S.infoBox}>
          Select a reward to request for <strong>{memberById(selectedMember)?.name}</strong> — a parent will approve it before it's redeemed.
        </div>
      )}

      <div style={S.rewardGrid}>
        {rewards.map((r) => {
          const member = selectedMember ? memberById(selectedMember) : null;
          const canAfford = member && member.stars >= r.cost;
          const alreadyPending = selectedMember && pendingRedemptions.some(p => p.rewardId === r.id && p.memberId === selectedMember);

          if (parentMode && editingId === r.id) {
            return (
              <div key={r.id} style={{ ...S.rewardCard, border:"2px solid #7C3AED" }}>
                <input value={editForm.title} onChange={e => setEditForm(f=>({...f,title:e.target.value}))}
                  style={{ width:"100%", padding:"6px 8px", borderRadius:6, border:"1.5px solid #E5E7EB", fontSize:13, boxSizing:"border-box", marginBottom:6 }} />
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <span style={{ fontSize:12, color:"#6B7280" }}>⭐</span>
                  <input value={editForm.cost} type="number" min={1} onChange={e => setEditForm(f=>({...f,cost:e.target.value}))}
                    style={{ width:60, padding:"6px 8px", borderRadius:6, border:"1.5px solid #E5E7EB", fontSize:13 }} />
                  <span style={{ fontSize:12, color:"#6B7280" }}>stars</span>
                </div>
                <div style={{ display:"flex", gap:6, marginTop:8 }}>
                  <button onClick={saveEdit} style={{ ...S.approveBtn, flex:1, padding:"6px" }}>Save</button>
                  <button onClick={() => setEditingId(null)} style={{ ...S.rejectBtn, flex:1, padding:"6px", background:"#6B7280" }}>Cancel</button>
                </div>
              </div>
            );
          }

          return (
            <div key={r.id} style={S.rewardCard}>
              <div style={S.rewardTitle}>{r.title}</div>
              <div style={S.rewardCost}>⭐ {r.cost} stars</div>
              {parentMode ? (
                <div style={{ display:"flex", gap:6, marginTop:4 }}>
                  <button onClick={() => startEdit(r)} style={{ ...S.addBtn, flex:1, fontSize:11, padding:"5px", background:"#7C3AED" }}>Edit</button>
                  <button onClick={() => deleteReward(r.id)} style={{ ...S.addBtn, flex:1, fontSize:11, padding:"5px", background:"#EF4444" }}>Delete</button>
                </div>
              ) : alreadyPending ? (
                <div style={{ fontSize:11, color:"#D97706", fontWeight:600 }}>⏳ Pending approval</div>
              ) : selectedMember ? (
                <button onClick={() => requestRedemption(r, selectedMember)}
                  style={{ ...S.redeemBtn, opacity: canAfford?1:0.35, background: member?.color||"#F59E0B" }}>
                  {canAfford ? "Request Reward" : "Not enough ⭐"}
                </button>
              ) : (
                <div style={S.rewardHint}>Select a person above</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Swim Tab ─────────────────────────────────────────────────────────────────
function SwimTab({ swimTimes, setSwimTimes, daughterCuts, setDaughterCuts, sonCuts, setSonCuts, swimmerNames, setSwimmerNames, parentMode }) {
  const [swimmer, setSwimmer]         = useState("daughter");
  const [swimView, setSwimView]       = useState("dashboard");
  const [editingCuts, setEditingCuts] = useState(false);
  const [cutsForm, setCutsForm]       = useState({});
  const [nameForm, setNameForm]       = useState({ ...swimmerNames });

  const isSon   = swimmer === "son";
  const events  = isSon ? SWIM_EVENTS_SON : SWIM_EVENTS_DAUGHTER;
  const times   = swimTimes[swimmer] || {};
  const cuts    = isSon ? sonCuts : daughterCuts;
  const setCuts = isSon ? setSonCuts : setDaughterCuts;

  const setTime = (event, val) =>
    setSwimTimes(prev => ({ ...prev, [swimmer]: { ...prev[swimmer], [event]: val } }));

  const startEditCuts = () => {
    const form = {};
    events.forEach(e => {
      form[e] = isSon
        ? { allStar: cuts[e]?.allStar || "" }
        : { jrChamps: cuts[e]?.jrChamps || "", champs: cuts[e]?.champs || "" };
    });
    setCutsForm(form);
    setEditingCuts(true);
  };

  const saveCuts = () => { setCuts({ ...cutsForm }); setEditingCuts(false); };

  const saveNames = () => setSwimmerNames({ ...nameForm });

  // Status config
  const STATUS_COLOR = { champs:"#7C3AED", jrChamps:"#3B82F6", allStar:"#F97316", none:"#F0F0F0" };
  const STATUS_TEXT  = { champs:"#fff", jrChamps:"#fff", allStar:"#fff", none:"#9CA3AF" };
  const STATUS_LABEL = { champs:"Champs ✓", jrChamps:"Jr. Champs ✓", allStar:"All-Star ✓", none:"—" };

  const getStatus = (event) => qualStatus(times[event], cuts[event] || {}, isSon);

  const gapToNext = (event) => {
    const pb = timeToSec(times[event]);
    if (!isFinite(pb)) return null;
    const st = getStatus(event);
    if (st !== "none") return null; // already qualified
    const target = isSon
      ? timeToSec(cuts[event]?.allStar)
      : timeToSec(cuts[event]?.jrChamps);
    if (!isFinite(target)) return null;
    return (pb - target).toFixed(2);
  };

  const qualified = events.filter(e => getStatus(e) !== "none");

  return (
    <div>
      {/* Swimmer selector + view toggle */}
      <div style={{ ...S.calHeader, flexWrap:"wrap", gap:8 }}>
        <div style={S.viewToggle}>
          <button style={{ ...S.viewBtn, ...(swimmer==="daughter"?S.viewBtnActive:{}) }} onClick={() => { setSwimmer("daughter"); setEditingCuts(false); }}>
            🏊‍♀️ {swimmerNames.daughter}
          </button>
          <button style={{ ...S.viewBtn, ...(swimmer==="son"?S.viewBtnActive:{}) }} onClick={() => { setSwimmer("son"); setEditingCuts(false); }}>
            🏊‍♂️ {swimmerNames.son}
          </button>
        </div>
        <div style={{ ...S.viewToggle, marginLeft:"auto" }}>
          {[["dashboard","📊 Dashboard"],["entry","✏️ Enter Times"],["cuts","🎯 Qual Times"]].map(([v,label]) => (
            <button key={v} style={{ ...S.viewBtn, ...(swimView===v?S.viewBtnActive:{}) }} onClick={() => { setSwimView(v); setEditingCuts(false); }}>{label}</button>
          ))}
        </div>
      </div>

      {/* ── DASHBOARD ── */}
      {swimView === "dashboard" && (
        <div>
          {/* Summary cards */}
          <div style={S.swimSummary}>
            <div style={S.swimSummaryCard}>
              <div style={S.swimSummaryNum}>{qualified.length}<span style={{ fontSize:14, color:"#9CA3AF" }}>/{events.length}</span></div>
              <div style={S.swimSummaryLabel}>Events qualified</div>
            </div>
            {isSon ? (
              <div style={S.swimSummaryCard}>
                <div style={{ ...S.swimSummaryNum, color:"#F97316" }}>{qualified.length}</div>
                <div style={S.swimSummaryLabel}>All-Star cuts</div>
              </div>
            ) : (
              <>
                <div style={S.swimSummaryCard}>
                  <div style={{ ...S.swimSummaryNum, color:"#7C3AED" }}>{qualified.filter(e=>getStatus(e)==="champs").length}</div>
                  <div style={S.swimSummaryLabel}>Champs cuts</div>
                </div>
                <div style={S.swimSummaryCard}>
                  <div style={{ ...S.swimSummaryNum, color:"#3B82F6" }}>{qualified.filter(e=>getStatus(e)==="jrChamps").length}</div>
                  <div style={S.swimSummaryLabel}>Jr. Champs cuts</div>
                </div>
              </>
            )}
            <div style={S.swimSummaryCard}>
              <div style={{ ...S.swimSummaryNum, color:"#EF4444" }}>{events.length - qualified.length}</div>
              <div style={S.swimSummaryLabel}>Still chasing</div>
            </div>
          </div>

          {/* Event table */}
          <div style={S.swimTable}>
            {/* Header */}
            <div style={{ ...S.swimRowBase, background:"#F9FAFB", fontWeight:700, fontSize:11, color:"#6B7280",
              gridTemplateColumns: isSon ? "120px 90px 90px 110px 70px" : "110px 80px 90px 90px 110px 60px" }}>
              <div>Event</div>
              <div style={{ textAlign:"center" }}>Your PB</div>
              {isSon ? <div style={{ textAlign:"center" }}>All-Star</div> : <>
                <div style={{ textAlign:"center" }}>Jr. Champs</div>
                <div style={{ textAlign:"center" }}>Champs</div>
              </>}
              <div style={{ textAlign:"center" }}>Status</div>
              <div style={{ textAlign:"center" }}>Gap</div>
            </div>

            {events.map(event => {
              const pb  = times[event] || "";
              const cut = cuts[event]  || {};
              const st  = getStatus(event);
              const gap = gapToNext(event);
              return (
                <div key={event} style={{ ...S.swimRowBase, background: st!=="none" ? STATUS_COLOR[st]+"15" : "#fff",
                  gridTemplateColumns: isSon ? "120px 90px 90px 110px 70px" : "110px 80px 90px 90px 110px 60px" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:"#374151" }}>{event}</div>
                  <div style={{ textAlign:"center", fontWeight:700, fontSize:13, color: st!=="none"?STATUS_COLOR[st]:"#1F2937" }}>{pb||"—"}</div>
                  {isSon
                    ? <div style={{ textAlign:"center", fontSize:12, color:"#6B7280" }}>{cut.allStar||"—"}</div>
                    : <>
                        <div style={{ textAlign:"center", fontSize:12, color:"#6B7280" }}>{cut.jrChamps||"—"}</div>
                        <div style={{ textAlign:"center", fontSize:12, color:"#6B7280" }}>{cut.champs||"—"}</div>
                      </>
                  }
                  <div style={{ textAlign:"center" }}>
                    <span style={{ ...S.swimStatusBadge, background: STATUS_COLOR[st], color: STATUS_TEXT[st] }}>
                      {STATUS_LABEL[st]}
                    </span>
                  </div>
                  <div style={{ textAlign:"center", fontSize:12, fontWeight:600, color: gap?"#EF4444": st!=="none"?"#10B981":"#9CA3AF" }}>
                    {gap ? `-${gap}s` : st!=="none" ? "✓" : "—"}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── TIME ENTRY ── */}
      {swimView === "entry" && (
        <div>
          <div style={{ fontSize:13, color:"#6B7280", marginBottom:14 }}>
            Enter times as <strong>1:05.23</strong> (min:sec.hundredths) or <strong>28.45</strong> (sec only). All SCY.
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {events.map(event => {
              const st = getStatus(event);
              return (
                <div key={event} style={S.swimEntryRow}>
                  <span style={S.swimEntryEvent}>{event}</span>
                  <input
                    value={times[event]||""}
                    onChange={e => setTime(event, e.target.value)}
                    placeholder="e.g. 1:05.23"
                    style={S.swimEntryInput}
                  />
                  <span style={{ ...S.swimStatusBadge, background: STATUS_COLOR[st], color: STATUS_TEXT[st], minWidth:90, textAlign:"center" }}>
                    {STATUS_LABEL[st]}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── QUALIFYING TIMES ── */}
      {swimView === "cuts" && (
        <div>
          {/* Swimmer name settings (parent only) */}
          {parentMode && (
            <div style={{ background:"#F9FAFB", borderRadius:10, padding:"12px 14px", marginBottom:14 }}>
              <div style={{ fontWeight:700, fontSize:13, marginBottom:8 }}>Swimmer Names</div>
              <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
                <input value={nameForm.daughter} onChange={e=>setNameForm(f=>({...f,daughter:e.target.value}))}
                  placeholder="Daughter's name" style={{ flex:1, padding:"7px 10px", borderRadius:8, border:"1.5px solid #E5E7EB", fontSize:13 }} />
                <input value={nameForm.son} onChange={e=>setNameForm(f=>({...f,son:e.target.value}))}
                  placeholder="Son's name" style={{ flex:1, padding:"7px 10px", borderRadius:8, border:"1.5px solid #E5E7EB", fontSize:13 }} />
                <button style={S.approveBtn} onClick={saveNames}>Save</button>
              </div>
            </div>
          )}

          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
            <div style={{ fontWeight:700, fontSize:14 }}>
              {isSon ? "All-Star Qualifying Times (SCY)" : "Jr. Champs & Champs Qualifying Times (SCY)"}
            </div>
            {parentMode && !editingCuts && (
              <button style={{ ...S.addBtn, background:"#7C3AED" }} onClick={startEditCuts}>Edit Times</button>
            )}
            {parentMode && editingCuts && (
              <div style={{ display:"flex", gap:6 }}>
                <button style={S.approveBtn} onClick={saveCuts}>Save</button>
                <button style={{ ...S.rejectBtn, background:"#6B7280" }} onClick={() => setEditingCuts(false)}>Cancel</button>
              </div>
            )}
          </div>

          {!parentMode && <div style={S.approvalInfoBox}>🔑 Unlock parent mode to edit qualifying times.</div>}

          <div style={S.swimTable}>
            <div style={{ ...S.swimRowBase, background:"#F9FAFB", fontWeight:700, fontSize:11, color:"#6B7280",
              gridTemplateColumns: isSon ? "140px 1fr" : "140px 1fr 1fr" }}>
              <div>Event</div>
              {isSon ? <div style={{ textAlign:"center" }}>All-Star Cut</div> : <>
                <div style={{ textAlign:"center" }}>Jr. Champs</div>
                <div style={{ textAlign:"center" }}>Champs</div>
              </>}
            </div>
            {events.map(event => {
              const cut = editingCuts ? cutsForm[event]||{} : cuts[event]||{};
              return (
                <div key={event} style={{ ...S.swimRowBase, gridTemplateColumns: isSon ? "140px 1fr" : "140px 1fr 1fr" }}>
                  <div style={{ fontSize:13, fontWeight:600, color:"#374151" }}>{event}</div>
                  {isSon ? (
                    <div style={{ textAlign:"center" }}>
                      {editingCuts
                        ? <input value={cut.allStar||""} onChange={e=>setCutsForm(f=>({...f,[event]:{allStar:e.target.value}}))}
                            placeholder="—" style={S.swimCutInput} />
                        : <span style={{ fontSize:13 }}>{cut.allStar||"—"}</span>}
                    </div>
                  ) : <>
                    <div style={{ textAlign:"center" }}>
                      {editingCuts
                        ? <input value={cut.jrChamps||""} onChange={e=>setCutsForm(f=>({...f,[event]:{...f[event],jrChamps:e.target.value}}))}
                            placeholder="—" style={S.swimCutInput} />
                        : <span style={{ fontSize:13 }}>{cut.jrChamps||"—"}</span>}
                    </div>
                    <div style={{ textAlign:"center" }}>
                      {editingCuts
                        ? <input value={cut.champs||""} onChange={e=>setCutsForm(f=>({...f,[event]:{...f[event],champs:e.target.value}}))}
                            placeholder="—" style={S.swimCutInput} />
                        : <span style={{ fontSize:13 }}>{cut.champs||"—"}</span>}
                    </div>
                  </>}
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function Modal({ modal, setModal, members, setMembers, setItems, setRewards, MEMBER_COLORS }) {
  const [form, setForm] = useState({ type: "chore", frequency: "Daily", stars: 1 });
  const close  = () => setModal(null);
  const f      = (k) => (e) => setForm((prev) => ({ ...prev, [k]: e.target.value }));

  const submit = () => {
    if (modal.type === "addItem") {
      if (!form.title || !form.memberId || !form.date) return alert("Title, person, and date are required.");
      setItems((prev) => [...prev, {
        id: Date.now(), type: form.type||"chore", title: form.title,
        memberId: +form.memberId, date: new Date(form.date).toISOString(),
        time: form.time||"", stars: +form.stars||0,
        frequency: ["chore"].includes(form.type) ? (form.frequency||"Daily") : null,
        completedDates: [],
      }]);
    } else if (modal.type === "addReward") {
      if (!form.title || !form.cost) return alert("Fill all fields.");
      setRewards((prev) => [...prev, { id: Date.now(), title: form.title, cost: +form.cost }]);
    } else if (modal.type === "addMember") {
      if (!form.name) return alert("Enter a name.");
      const used  = members.map((m) => m.color);
      const color = MEMBER_COLORS.find((c) => !used.includes(c)) || MEMBER_COLORS[0];
      setMembers((prev) => [...prev, { id: Date.now(), name: form.name, color, stars: 0 }]);
    }
    close();
  };

  const titles = { addItem:"Add Item", addReward:"Add Reward", addMember:"Add Family Member" };

  return (
    <div style={S.overlay} onClick={close}>
      <div style={S.modalBox} onClick={(e) => e.stopPropagation()}>
        <div style={S.modalHeader}>
          <h3 style={S.modalTitle}>{titles[modal.type]}</h3>
          <button style={S.modalClose} onClick={close}>✕</button>
        </div>
        <div style={S.modalBody}>
          {modal.type === "addItem" && (
            <>
              <Label>Type</Label>
              <Select onChange={f("type")} value={form.type}>
                <option value="chore">🧹 Chore</option>
                <option value="task">📝 Task</option>
                <option value="event">📅 Event</option>
                <option value="reminder">🔔 Reminder</option>
              </Select>
              <Label>Title</Label>
              <Input placeholder="e.g. Wash dishes" onChange={f("title")} />
              <Label>Assign to</Label>
              <Select onChange={f("memberId")}>
                <option value="">— select —</option>
                {members.map((m) => <option key={m.id} value={m.id}>{m.name}</option>)}
              </Select>
              <Label>Date</Label>
              <Input type="date" onChange={f("date")} />
              <Label>Time (optional)</Label>
              <Input type="time" onChange={f("time")} />
              {form.type === "chore" && <>
                <Label>Frequency</Label>
                <Select onChange={f("frequency")} value={form.frequency}>
                  <option value="Daily">Daily</option>
                  <option value="Weekly">Weekly</option>
                  <option value="Once">Once</option>
                </Select>
              </>}
              {["chore","task"].includes(form.type) && <>
                <Label>Stars / Points awarded</Label>
                <Input type="number" min={0} max={20} placeholder="e.g. 3" onChange={f("stars")} />
              </>}
            </>
          )}
          {modal.type === "addReward" && (
            <>
              <Label>Reward title</Label>
              <Input placeholder="e.g. Extra screen time" onChange={f("title")} />
              <Label>Stars / Points cost</Label>
              <Input type="number" min={1} placeholder="e.g. 20" onChange={f("cost")} />
            </>
          )}
          {modal.type === "addMember" && (
            <>
              <Label>Name</Label>
              <Input placeholder="e.g. Riley" onChange={f("name")} />
            </>
          )}
        </div>
        <div style={S.modalFooter}>
          <button style={S.cancelBtn} onClick={close}>Cancel</button>
          <button style={S.submitBtn} onClick={submit}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ─── Small helpers ────────────────────────────────────────────────────────────
function Label({ children }) {
  return <div style={{ fontSize:13, fontWeight:600, color:"#6B7280", marginBottom:4, marginTop:12 }}>{children}</div>;
}
function Input(props) {
  return <input {...props} style={{ width:"100%", padding:"8px 10px", borderRadius:8, border:"1.5px solid #E5E7EB", fontSize:14, boxSizing:"border-box", outline:"none" }} />;
}
function Select({ children, onChange, value }) {
  return (
    <select onChange={onChange} value={value} style={{ width:"100%", padding:"8px 10px", borderRadius:8, border:"1.5px solid #E5E7EB", fontSize:14, boxSizing:"border-box", background:"#fff" }}>
      {children}
    </select>
  );
}
